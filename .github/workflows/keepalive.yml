import axios from 'axios';

/**
 * Función para mantener la app despierta en Render
 * @param {string} selfUrl - La URL de tu app en Render
 * @param {string} stationUrl - La URL de la estación (mooo.com)
 */
export const startKeepAlive = (selfUrl, stationUrl) => {
    const keepActive = async () => {
        try {
            // 1. Ping a sí mismo
            await axios.get(selfUrl);
            console.log("[" + new Date().toLocaleTimeString() + "] Auto-ping exitoso.");

            // 2. Opcional: Ping a la estación para ver si responde
            const response = await axios.get(stationUrl, { timeout: 10000 });
            if (response.status === 200) {
                console.log("[" + new Date().toLocaleTimeString() + "] Estación EARG online.");
            }
        } catch (error) {
            console.error("[" + new Date().toLocaleTimeString() + "] Keep-active log: " + error.message);
        }
    };

    // Ejecutar cada 10 minutos
    setInterval(keepActive, 600000);
    
    // Ejecución inmediata al arrancar
    keepActive();
};
