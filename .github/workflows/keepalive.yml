
name: Keep Render App Active

# Ejecutar cada 5 minutos para mantener la app despierta
on:
  schedule:
    # Cron: cada 5 minutos (*/5 = cada 5 min, * = todas las horas/días)
    - cron: '*/5 * * * *'
  
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping a la app de Render
        run: |
          echo "🔄 Haciendo ping a earg-weather-proxy..."
          echo "⏰ Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          
          # Hacer petición HTTP con timeout de 30 segundos
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://earg-weather-proxy.onrender.com/weather-view)
          
          echo "📡 Código de respuesta: $response"
          
          # Verificar si la respuesta fue exitosa (2xx)
          if [ $response -ge 200 ] && [ $response -lt 300 ]; then
            echo "✅ App activa - Respuesta exitosa"
          else
            echo "⚠️ Advertencia - Código inesperado: $response"
          fi
          
          echo "✨ Ping completado"
