
name: Keep Render App Active

on:
  schedule:
    - cron: '*/5 * * * *' # Cada 5 minutos
  workflow_dispatch: # Permite ejecutarlo a mano para probar

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar Render
        run: |
          URL="https://earg-weather-proxy.onrender.com/weather-view"
          echo "🔄 Enviando señal de vida a la estación..."
          
          # Hacemos 3 intentos por si la primera vez está muy dormido
          for i in {1..3}; do
            echo "Tentativa $i..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 $URL)
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Estación activa y respondiendo."
              break
            else
              echo "⏳ Render está arrancando (Código $RESPONSE), esperando 15s..."
              sleep 15
            fi
          done
