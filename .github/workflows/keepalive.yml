import axios from 'axios';

// URL de tu propia aplicación en Render para que se auto-despierte
const SELF_URL = 'https://tu-app-en-render.onrender.com/'; 
// URL de la estación de Río Grande (mooo.com)
const STATION_URL = 'http://earg_met.mooo.com:88/meteo/';

/**
 * Función simple para hacer ping a ambas URLs
 */
const keepActive = async () => {
  try {
    // 1. Se despierta a sí mismo
    await axios.get(SELF_URL);
    console.log(`[${new Date().toLocaleTimeString()}] Auto-ping exitoso.`);

    // 2. Verifica que la estación de la EARG responda
    const response = await axios.get(STATION_URL, { timeout: 10000 });
    if (response.status === 200) {
      console.log(`[${new Date().toLocaleTimeString()}] Estación mooo.com online.`);
    }
  } catch (error) {
    console.error(`[${new Date().toLocaleTimeString()}] Error en el keep-active:`, error.message);
  }
};

/**
 * Ejecutar cada 10 minutos (600,000 milisegundos)
 * Esto evita que Render apague la instancia gratuita.
 */
setInterval(keepActive, 600000);

// Ejecución inmediata al arrancar el servidor
keepActive();
